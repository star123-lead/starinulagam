<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Thangamani Palanivel (Star)</title>
  <meta name="description" content="The page you are looking for does not exist. Return to Thangamani Palanivel (Star)'s portfolio.">
  <link rel="icon" type="image/png" href="favicon.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #0e0c0a;
      --surface: #161310;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: #7a6430;
      --text: #ede8e0;
      --muted: #8a8070;
      --border: rgba(201,168,76,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(rgba(14, 12, 10, 0.85), rgba(14, 12, 10, 0.92)), 
                  url('background.png') no-repeat center center fixed;
      background-size: cover;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px; pointer-events: none; z-index: 9999; opacity: 0.5;
    }

    .error-container {
      max-width: 500px;
      padding: 3rem;
      background: rgba(28, 25, 21, 0.65);
      border: 1px solid var(--border);
      border-radius: 6px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      z-index: 10;
      position: relative;
    }

    .error-container::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .error-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 5rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 1.5rem;
      letter-spacing: -0.05em;
      position: relative;
      display: inline-block;
    }

    .error-code::after {
      content: 'ERROR_PAGE_NOT_FOUND';
      position: absolute;
      bottom: -0.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--gold-dim);
    }

    .error-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .error-desc {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 2.2rem;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.8rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      border: 1px solid var(--gold);
      background: var(--gold);
      color: var(--bg);
      box-shadow: 0 4px 12px rgba(201, 168, 76, 0.12);
      transition: all 0.35s ease;
      cursor: pointer;
    }

    .btn:hover {
      background: var(--gold-light);
      border-color: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(201, 168, 76, 0.25);
    }

    .click-ripple {
      position: fixed; border: 2px solid var(--gold); background: rgba(201, 168, 76, 0.05);
      border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); 
      animation: ripple-expansion 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; z-index: 10005;
    }
    @keyframes ripple-expansion {
      0% { width: 0; height: 0; opacity: 0.8; }
      100% { width: 180px; height: 180px; opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Route Lost</h1>
    <p class="error-desc">The digital pathway you requested is currently unavailable or has been relocated to another node.</p>
    <a href="/" class="btn">Return to Node Zero ↩</a>
  </div>

  <script>
    // Ripple Effect
    window.addEventListener('click', (e) => {
      const ripple = document.createElement('span');
      ripple.className = 'click-ripple';
      ripple.style.left = `${e.clientX}px`;
      ripple.style.top = `${e.clientY}px`;
      document.body.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
    });
  </script>
</body>
</html>
